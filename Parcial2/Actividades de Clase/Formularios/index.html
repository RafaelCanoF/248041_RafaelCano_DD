<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios dinámicos</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <form action="">
        <label for="nombre">Nombre</label>
        <input type="text" name="nombre" placeholder="Ingresa el nombre" id="input_txt_nombre"> 
        <br>
        <label for="apellido">Apellido</label>
        <input type="text" name="apellido" placeholder="Ingresa el apellido" id="input_txt_apellido"> 
        <br>
        <label for="correo">Correo</label>
        <input type="email" name="correo" placeholder="Ingresa el correo" id="input_txt_correo"> 
        <br>
        <label for="contrasena">Contraseña</label>
        <input type="password" name="contrasena" placeholder="Ingresa la contrseña" id="input_txt_contrasena"> 
        <br>
        <label for="cantidad_correos">Ingrese la cantidad de correos que se va a ingresar</label>
        <input type="number" name="cantidad_correos" id="cantidad_correos" onchange="cambiarNumero(event)">
        <br>
        <div class="contenedor_correos" id="contenedor_correos">

        </div>

        <div id="contenedor_usuarios">
            <div id="contenedor_usuario">
            </div>
        </div>

        <br>
        <button type="submit" id="boton_guardar">Guardar datos</button>
    </form>
    <form  id="form_2">
<label for="nombre">Nombre</label>
        <input type="text" name="nombre" placeholder="Ingresa el nombre"> 
        <br>
        <label for="apellido">Apellido</label>
        <input type="text" name="apellido" placeholder="Ingresa el apellido"> 
        <br>
        <label for="correo">Correo</label>
        <input type="email" name="correo" placeholder="Ingresa el correo" > 
        <br>
        <label for="contrasena">Contraseña</label>
        <input type="password" name="contrasena" placeholder="Ingresa la contrseña"> 
        <br>
        <button type="button" onclick="leerDatos()">Guardar</button>
    </form>


    <script src="js/script.js"></script>
</body>
</html>
