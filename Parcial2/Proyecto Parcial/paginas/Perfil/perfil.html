<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poppy Store</title>

<link rel="stylesheet" href="css/estilo.css">

</head>

<body>
<nav class="navbar">

<div class="navLeft">

<img class="logo" src="recursos/Poppy_Playtime_Logo.webp">


<a href="../Inicio/inicio.html">Inicio</a>

</div>


<div class="navRight">

<button onclick="logout()">Cerrar sesión</button>

</div>

</nav>



<main class="profileContainer">

<h1 class="title">Editar perfil</h1>

<div class="profileCard">

<div class="photoUpload">

    <img id="preview" src="../recursos/defaultProfile.png">

    <label for="photo" class="uploadBtn">
        SUBIR FOTO
    </label>

    <input type="file" id="photo" accept="image/*">

</div>

<form id="profileForm">

<input type="text" id="name" placeholder="Nombre">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Nueva contraseña">

<button type="submit">Guardar cambios</button>

</form>

</div>

</main>

<script src="js/script.js"></script>

</body>
</html>
